name: build

on:
  workflow_call:
    inputs:
      # All inputs are optional fallbacks; the preferred source is the
      # caller flake's `manifest` attr (see unpins/nix-lib's
      # mkStandaloneFlake). Inputs override manifest only when they
      # differ from their default (non-empty for strings, true for
      # booleans), so workflows that have migrated to manifest can drop
      # the `with:` block entirely.
      package_name:
        type: string
        default: ""
      package_data:
        type: boolean
        default: false
      bootstrap_naming:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_tag:
        type: string
        default: ""
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.matrix.outputs.include }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      package_data: ${{ steps.resolve.outputs.package_data }}
      bootstrap_naming: ${{ steps.resolve.outputs.bootstrap_naming }}
      # JSON array of CLI args, e.g. `["--version"]`, or "null" when the
      # caller flake doesn't opt in. Consumed by the Smoke step in build
      # and by the smoke_windows job.
      smoke: ${{ steps.resolve.outputs.smoke }}
      # Optional grep-E pattern that must match smoke stdout+stderr.
      smoke_pattern: ${{ steps.resolve.outputs.smoke_pattern }}
      # JSON array of Apple PrivateFramework names the darwin portability
      # check accepts for this package (per-package exception). "[]" when
      # the caller flake doesn't opt in.
      darwin_allow_private_frameworks: ${{ steps.resolve.outputs.darwin_allow_private_frameworks }}
      has_windows: ${{ steps.matrix.outputs.has_windows }}
      hosts: ${{ steps.matrix.outputs.hosts }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - id: manifest
        run: |
          set -euo pipefail
          MANIFEST="$(nix eval --json '.#manifest' 2>/dev/null || echo '{}')"
          echo "Manifest from flake: ${MANIFEST}"
          echo "json=${MANIFEST}" >> "${GITHUB_OUTPUT}"
      - id: resolve
        env:
          MANIFEST: ${{ steps.manifest.outputs.json }}
          IN_NAME: ${{ inputs.package_name }}
          IN_DATA: ${{ inputs.package_data }}
          IN_BOOT: ${{ inputs.bootstrap_naming }}
        run: |
          set -euo pipefail
          # Strings: input wins if non-empty. Booleans: input wins if true
          # (its non-default value); else defer to manifest. Manifest itself
          # defaults to false/empty when keys are absent.
          NAME="${IN_NAME:-$(jq -r '.name // ""' <<<"${MANIFEST}")}"
          if [ -z "${NAME}" ]; then
            echo "::error::no package_name input and no .#manifest.name in caller flake"
            exit 1
          fi
          DATA="${IN_DATA}"
          if [ "${DATA}" = "false" ]; then DATA="$(jq -r '.package_data // false' <<<"${MANIFEST}")"; fi
          BOOT="${IN_BOOT}"
          if [ "${BOOT}" = "false" ]; then BOOT="$(jq -r '.bootstrap_naming // false' <<<"${MANIFEST}")"; fi
          # `.smoke` is null when not opted in, otherwise an array. jq emits
          # the literal "null" or the array JSON — both round-trip cleanly
          # into the smoke step's `if`/`fromJSON` consumers. `.smoke_pattern`
          # is a raw string (or empty when null) consumed by `grep -E`.
          SMOKE="$(jq -c '.smoke // null' <<<"${MANIFEST}")"
          SMOKE_PAT="$(jq -r '.smoke_pattern // ""' <<<"${MANIFEST}")"
          # JSON array (compact) of allowed Apple PrivateFrameworks; "[]" when
          # the caller flake doesn't opt in. Consumed by the darwin branch of
          # the "Verify binary is portable" step.
          DARWIN_PF="$(jq -c '.darwin_allow_private_frameworks // []' <<<"${MANIFEST}")"
          echo "Resolved: name=${NAME} package_data=${DATA} bootstrap_naming=${BOOT} smoke=${SMOKE} smoke_pattern=${SMOKE_PAT} darwin_allow_private_frameworks=${DARWIN_PF}"
          echo "package_name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "package_data=${DATA}" >> "${GITHUB_OUTPUT}"
          echo "bootstrap_naming=${BOOT}" >> "${GITHUB_OUTPUT}"
          echo "smoke=${SMOKE}" >> "${GITHUB_OUTPUT}"
          echo "smoke_pattern=${SMOKE_PAT}" >> "${GITHUB_OUTPUT}"
          echo "darwin_allow_private_frameworks=${DARWIN_PF}" >> "${GITHUB_OUTPUT}"
      - id: matrix
        # Auto-discover the build matrix from the caller flake's `packages`.
        # For each host system we have a runner for, emit one matrix entry per
        # attr in `packages.<sys>`:
        #   - "default"          → native job (os/arch from the host system)
        #   - "<os>-<arch>"      → cross job (os/arch parsed from the attr name;
        #                         e.g. linux-armv7l, windows-x86_64,
        #                         darwin-x86_64); `attr` field is set so the
        #                         build step can pass the full flake path.
        # Hosts without an `attr` field default to `.#default`. Systems
        # without a runner (e.g. x86_64-darwin) are skipped — cross to them
        # comes via an explicit `darwin-x86_64` attr under aarch64-darwin.
        run: |
          set -euo pipefail
          INCLUDE=$(nix eval --json --apply '
            pkgs:
              let
                runnerMap = {
                  "x86_64-linux" = "ubuntu-latest";
                  "aarch64-linux" = "ubuntu-24.04-arm";
                  "aarch64-darwin" = "macos-14";
                };
                nativeOsArch = {
                  "x86_64-linux"   = { os = "linux";  arch = "x86_64";  };
                  "aarch64-linux"  = { os = "linux";  arch = "aarch64"; };
                  "aarch64-darwin" = { os = "darwin"; arch = "aarch64"; };
                };
                # `canSmokeNative`: true when the build runner can execute
                # the target binary in-place. Exact ABI match for linux;
                # darwin-x86_64 on aarch64-darwin is OK thanks to Rosetta 2.
                # Everything else (linux-i686/armv7l/ppc64le/riscv64,
                # windows-x86_64) is cross-only — smoke for windows-x86_64
                # runs in the dedicated `smoke_windows` job; other crosses
                # are not smoke-tested.
                canSmokeNative = sys: k:
                  if k == "default" then true
                  else if sys == "aarch64-darwin" && k == "darwin-x86_64" then true
                  else false;
                entriesFor = sys:
                  if !(runnerMap ? ${sys}) then []
                  else map (k:
                    if k == "default" then {
                      runner = runnerMap.${sys};
                      sys = sys;
                      os = nativeOsArch.${sys}.os;
                      arch = nativeOsArch.${sys}.arch;
                      can_smoke_native = canSmokeNative sys k;
                    }
                    else
                      let m = builtins.match "^([^-]+)-(.+)$" k; in
                      if m == null then null else {
                        runner = runnerMap.${sys};
                        sys = sys;
                        os = builtins.elemAt m 0;
                        arch = builtins.elemAt m 1;
                        attr = "packages." + sys + ".\"" + k + "\"";
                        can_smoke_native = canSmokeNative sys k;
                      }
                  ) (builtins.attrNames (pkgs.${sys} or {}));
              in
                builtins.filter (e: e != null)
                  (builtins.concatLists
                    (map entriesFor (builtins.attrNames pkgs)))
          ' '.#packages')
          echo "Discovered matrix:"
          jq . <<<"${INCLUDE}"
          echo "include=${INCLUDE}" >> "${GITHUB_OUTPUT}"
          # `has_windows` gates the smoke_windows job. true when any
          # matrix entry targets windows (currently only `windows-x86_64`).
          HAS_WIN="$(jq -c 'any(.os == "windows")' <<<"${INCLUDE}")"
          echo "has_windows=${HAS_WIN}" >> "${GITHUB_OUTPUT}"
          # Distinct build hosts, for the warm-toolchain job. One engine
          # toolchain is built per host and shared by that host's native build
          # and every cross it emits, so warming once per host (not per target)
          # is enough to spare every fan-out job the rebuild.
          HOSTS="$(jq -c '[.[] | {runner, sys}] | unique' <<<"${INCLUDE}")"
          echo "Distinct hosts: ${HOSTS}"
          echo "hosts=${HOSTS}" >> "${GITHUB_OUTPUT}"

  # Build the unpin-llvm engine toolchain once per host and push it to cachix,
  # so the fan-out `build` jobs substitute it instead of each rebuilding the
  # same ~1-2h LLVM compile (one toolchain serves a host's native build and
  # every cross it emits). A no-op for packages that don't use the engine.
  warm:
    needs: preflight
    name: warm (${{ matrix.sys }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: unpins
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build engine toolchain
        env:
          SYS: ${{ matrix.sys }}
        run: |
          set -euo pipefail
          # The toolchain is in the native default's dependency closure; the
          # `unpin-llvm-static-*` naming is stable. Realize only those drvs
          # (cachix-action's post step pushes them). Empty match → engine not
          # in use → nothing to do.
          DRV="$(nix path-info --derivation ".#packages.${SYS}.default")"
          TC="$(nix-store -q --requisites "${DRV}" \
            | grep -E '/nix/store/[a-z0-9]+-unpin-llvm-static-.*\.drv$' \
            | sort -u || true)"
          if [ -z "${TC}" ]; then
            echo "No engine toolchain in closure — nothing to warm."
            exit 0
          fi
          echo "Warming:"; printf '%s\n' "${TC}"
          # `nix build <drv>^*` realizes all outputs (nix-store -r has no
          # --print-build-logs); cachix-action's post step pushes them.
          for d in ${TC}; do
            nix build "${d}^*" --no-link --print-build-logs
          done

  build:
    # `warm` is a pure cache-population optimization: depend on it so build
    # starts after the toolchain is in cachix, but `always()` keeps build
    # running even if warm fails/skips (build then just rebuilds the
    # toolchain itself). Guard on preflight so build still needs the matrix.
    needs: [preflight, warm]
    if: ${{ always() && needs.preflight.result == 'success' }}
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.include) }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: unpins
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Resolve version
        id: ver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            VER="${RELEASE_TAG#v}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            VER="${REF_NAME#v}"
          else
            VER="snapshot-${GITHUB_SHA::7}"
          fi
          echo "version=${VER}" >> "${GITHUB_OUTPUT}"
          echo "Resolved version: ${VER}"

      - name: Validate tag matches upstream version
        if: github.ref_type == 'tag'
        env:
          TAG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "${TAG_VERSION}" =~ ^(.+)-([0-9]+)$ ]]; then
            echo "::error::tag '${TAG_VERSION}' must match <upstream>-<pkgrel> (e.g. 3.4.1-2)"
            exit 1
          fi
          UPSTREAM_FROM_TAG="${BASH_REMATCH[1]}"
          PKGREL="${BASH_REMATCH[2]}"
          UPSTREAM_FROM_NIX="$(nix eval --raw .#default.version)"
          if [ "${UPSTREAM_FROM_TAG}" != "${UPSTREAM_FROM_NIX}" ]; then
            echo "::error::tag declares upstream ${UPSTREAM_FROM_TAG} but flake builds ${UPSTREAM_FROM_NIX}"
            exit 1
          fi
          echo "Tag v${TAG_VERSION} matches upstream ${UPSTREAM_FROM_NIX} (pkgrel ${PKGREL})"

      # The engine multicall self-fold codegens ONE whole-program LTO module per
      # package. For a big all-targets package the ld.lld peak exceeds the 16 GB
      # runner RAM and the linker is OOM-killed: binutils (--enable-targets=all
      # folds libbfd + ld/as/gold with every target's emulation) measured a
      # ~19.5 GB peak, so all six linux arches OOM'd. A swapfile absorbs the
      # few-GB overshoot with negligible thrashing, keeping the link at full
      # -O2 LTO (byte-identical to a well-resourced build). Inert for packages
      # whose link fits in RAM — the swap is provisioned but never touched. The
      # temp disk (/mnt on the Azure runner images, both x86 and arm) has room;
      # fall back to / and to dd where fallocate is unsupported.
      - name: Add swap for large LTO fold links
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          SWAP=/mnt/swapfile; [ -d /mnt ] || SWAP=/swapfile
          sudo fallocate -l 24G "$SWAP" 2>/dev/null \
            || sudo dd if=/dev/zero of="$SWAP" bs=1M count=24576 status=none
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP" >/dev/null
          sudo swapon "$SWAP"
          free -h

      - name: nix build
        env:
          ATTR: ${{ matrix.attr }}
        run: |
          set -euo pipefail
          # Default to .#default; cross builds expose under packages.<host>.<name>
          # and the caller passes the full attr path via matrix.attr.
          TARGET=".#${ATTR:-default}"
          echo "Building ${TARGET}"
          nix build "${TARGET}" --print-build-logs

      - name: Verify binary is portable
        env:
          PKG: ${{ needs.preflight.outputs.package_name }}
          OS: ${{ matrix.os }}
          # JSON array of Apple PrivateFramework names this package may link
          # (per-package darwin exception); "[]" when not opted in.
          DARWIN_PF: ${{ needs.preflight.outputs.darwin_allow_private_frameworks }}
        run: |
          set -euo pipefail
          case "${OS}" in
            linux)
              # Some pkgs (bash-interactive, etc.) put the real ELF in a
              # sub-derivation and `result/bin/<pkg>` is itself a symlink.
              # Resolve the full chain so `file` inspects the binary, not
              # the link descriptor.
              BIN="$(readlink -f result/bin/${PKG})"
              info="$(file -b "${BIN}")"
              echo "${info}"
              # `file` says "statically linked" for a plain static ELF and
              # "static-pie linked" for a static PIE (Rust's default for
              # musl static binaries). Both are fully self-contained.
              if ! grep -qE "statically linked|static-pie linked" <<<"${info}"; then
                echo "::error::${PKG}: Linux binary is not statically linked"
                exit 1
              fi
              ;;
            darwin)
              BIN="$(readlink -f result/bin/${PKG})"
              # otool -L's first line is the inspected binary's own path
              # ("/nix/store/.../bin/${PKG}:"); skip it so the dep check
              # applies only to dependency lines.
              deps="$(otool -L "${BIN}" | tail -n +2)"
              echo "${deps}"
              # Apple only guarantees ABI stability for libSystem and the
              # system frameworks; every other dylib in /usr/lib is de-facto
              # but not contractually stable. Enforce a minimal allow-list:
              #   - libSystem.B.dylib (the C library)
              #   - /System/Library/Frameworks/* (versioned but stable)
              #   - libobjc.A.dylib (ObjC runtime — required by any framework,
              #     Apple disallows static linking)
              # libc++ is intentionally NOT allowed — it can be linked statically
              # (pkgsStatic.libcxx). Same applies to libresolv/libiconv/libxml2.
              bad="$(awk '{print $1}' <<<"${deps}" \
                | grep -Ev '^/usr/lib/libSystem\.[A-Za-z0-9.]+\.dylib$' \
                | grep -Ev '^/System/Library/Frameworks/[^/]+\.framework/' \
                | grep -Ev '^/usr/lib/libobjc\.[A-Za-z0-9.]+\.dylib$' \
                || true)"
              # Per-package exception: a package may declare specific Apple
              # PrivateFrameworks (manifest.darwin_allow_private_frameworks)
              # when an upstream macOS feature has no public-framework path.
              # Drop those from the leftover set; everything else still fails.
              # Names are plain framework identifiers (e.g. MediaRemote), so a
              # ".framework/" anchor keeps the match exact.
              for fw in $(jq -r '.[]' <<<"${DARWIN_PF:-[]}"); do
                bad="$(grep -Ev "^/System/Library/PrivateFrameworks/${fw}\.framework/" <<<"${bad}" || true)"
              done
              if [ -n "${bad}" ]; then
                echo "::error::${PKG}: darwin binary links non-system libraries:"
                printf '%s\n' "${bad}"
                exit 1
              fi
              ;;
            windows)
              BIN="$(readlink -f result)/bin/${PKG}.exe"
              # Reject any companion DLL in the same directory — unpins ships
              # single-binary artifacts only.
              extras="$(find "$(dirname "${BIN}")" -maxdepth 1 -type f -name '*.dll' -o -name '*.DLL')"
              if [ -n "${extras}" ]; then
                echo "::error::${PKG}: companion DLLs present alongside .exe:"
                printf '%s\n' "${extras}"
                exit 1
              fi
              # Inspect imports with the cross binutils' objdump (GNU
              # objdump on the runner doesn't surface the DLL Name field).
              imports="$(nix shell nixpkgs#pkgsCross.mingwW64.buildPackages.binutils-unwrapped \
                --command x86_64-w64-mingw32-objdump -p "${BIN}" \
                | awk '/DLL Name:/ {print $NF}')"
              echo "${imports}"
              # Reject any "lib*.dll" import — convention is that runtime/3rd
              # party DLLs are named libfoo-N.dll while system DLLs use
              # uppercase Microsoft naming (KERNEL32, USER32, MSVCRT, ...).
              bad="$(echo "${imports}" | grep -iE '^lib.*\.dll$' || true)"
              if [ -n "${bad}" ]; then
                echo "::error::${PKG}: imports non-system DLL(s):"
                printf '%s\n' "${bad}"
                exit 1
              fi
              ;;
          esac

      - name: Smoke (host)
        # Skip when caller didn't opt in to smoke (smoke == "null") OR when
        # the build runner can't execute this target's ABI (cross-only).
        if: needs.preflight.outputs.smoke != 'null' && matrix.can_smoke_native
        env:
          PKG: ${{ needs.preflight.outputs.package_name }}
          OS: ${{ matrix.os }}
          SMOKE_JSON: ${{ needs.preflight.outputs.smoke }}
          SMOKE_PATTERN: ${{ needs.preflight.outputs.smoke_pattern }}
        run: |
          set -euo pipefail
          EXT=""
          [ "${OS}" = "windows" ] && EXT=".exe"
          BIN="$(readlink -f result/bin/${PKG}${EXT})"
          # macOS ships bash 3.2 — no `mapfile`/`readarray`. Use a portable
          # while-read loop. Single-line args only (the realistic case for
          # CLI flags like `--version`).
          SMOKE_ARGS=()
          while IFS= read -r arg; do
            SMOKE_ARGS+=("$arg")
          done < <(jq -r '.[]' <<<"${SMOKE_JSON}")
          echo "Running: ${BIN} ${SMOKE_ARGS[*]}"
          OUTPUT="$("${BIN}" "${SMOKE_ARGS[@]}" 2>&1)"
          echo "${OUTPUT}"
          if [ -n "${SMOKE_PATTERN}" ]; then
            if ! grep -Eq -- "${SMOKE_PATTERN}" <<<"${OUTPUT}"; then
              echo "::error::smoke output did not match pattern: ${SMOKE_PATTERN}"
              exit 1
            fi
          fi

      - name: Stage artifacts
        id: stage
        env:
          PKG: ${{ needs.preflight.outputs.package_name }}
          VERSION: ${{ steps.ver.outputs.version }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          WANT_DATA: ${{ needs.preflight.outputs.package_data }}
          BOOTSTRAP: ${{ needs.preflight.outputs.bootstrap_naming }}
        run: |
          set -euo pipefail
          mkdir -p out
          OUT_DIR="$(readlink -f result)"
          EXT=""
          if [ "${OS}" = "windows" ]; then
            EXT=".exe"
          fi
          # Resolve through any symlink chain. When the package is a
          # `symlinkJoin` (e.g. nix-lib's packageWithMan for multi-output
          # drvs like jq), `${OUT_DIR}/bin/${PKG}` is a symlink, and zstd
          # silently ignores symlinks and exits 1 with no message. cp -L
          # similarly needs the real file. Resolve once up front.
          BIN_SRC="$(readlink -f "${OUT_DIR}/bin/${PKG}${EXT}")"
          # Primary artifact: <pkg>-<version>-<arch>-<os>[.exe].zst, single-file
          # zstd (no tar wrapper) — `unpin install` parses this naming.
          # arch-first matches Rust target triples and the bootstrap naming
          # already used here. System zstd is pre-installed on every supported
          # runner image (ubuntu-latest, ubuntu-24.04-arm, macos-14) and tar
          # --zstd below also needs it, so we skip the nix path.
          STEM_VER="${PKG}-${VERSION}-${ARCH}-${OS}"
          zstd -19 -q -o "out/${STEM_VER}${EXT}.zst" "${BIN_SRC}"
          # Bootstrap (currently just `unpin`): also publish a versionless raw
          # binary so unpins.org's `/unpin-<arch>-<os>[.exe]` redirect lands on
          # an asset present in every release via GitHub's `releases/latest`.
          if [ "${BOOTSTRAP}" = "true" ]; then
            STEM_BOOT="${PKG}-${ARCH}-${OS}"
            cp "${BIN_SRC}" "out/${STEM_BOOT}${EXT}"
          fi
          # Data tarball (man pages, runtime files, etc). One asset per
          # release, not per platform: vim/gvim runtime is Vimscript/syntax
          # text — identical on every target. Gate on the native Linux x86_64
          # job to pick a single producer; the other matrix jobs ignore data
          # and the tarball gets uploaded once. unpin pairs it with primary
          # assets by tag in preflight (see install.rs::find_companion).
          if [ "${WANT_DATA}" = "true" ] \
             && [ -d "${OUT_DIR}/share" ] \
             && [ "${OS}" = "linux" ] \
             && [ "${ARCH}" = "x86_64" ]; then
            DATA_STEM="${PKG}-${VERSION}-data"
            tar --zstd -cf "out/${DATA_STEM}.tar.zst" -C "${OUT_DIR}" share
          fi

          # SHA-256 sidecar per artifact. `openssl dgst -r` emits the sha256sum
          # format (`<hash>  <filename>`); openssl is pre-installed on every
          # runner image (ubuntu-latest, ubuntu-24.04-arm, macos-14), unlike
          # GNU coreutils' `sha256sum` which is absent on macos.
          ( cd out && for f in *; do
              case "$f" in *.sha256) continue ;; esac
              openssl dgst -r -sha256 -out "${f}.sha256" "${f}"
            done )

          ls -lh out/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.preflight.outputs.package_name }}-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

  # Cosmocc-built Windows .exe needs a real Windows runner to validate
  # (wine doesn't run cosmo binaries; mingw-cross PEs would work under
  # wine but a Windows runner covers both with one job). Build matrix
  # runs on linux; this job downloads the artifact and executes it.
  smoke_windows:
    name: smoke (windows-x86_64)
    needs: [preflight, build]
    # `always() &&` makes this run even when other matrix entries failed
    # (e.g. darwin smoke regression unrelated to the windows-x86_64
    # artifact). If the windows-x86_64 build itself failed, the artifact
    # is missing and the Locate step errors loud — that's the signal we
    # want, not a silent skip.
    if: always() && needs.preflight.outputs.has_windows == 'true' && needs.preflight.outputs.smoke != 'null'
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*-windows-x86_64'
      - name: Locate and decompress .exe
        shell: bash
        env:
          PKG: ${{ needs.preflight.outputs.package_name }}
        run: |
          set -euo pipefail
          # Artifact dir layout: dist/<pkg>-<ver>-windows-x86_64/<pkg>-<ver>-x86_64-windows.exe.zst
          EXE_ZST="$(find dist -type f -name '*.exe.zst' | head -1)"
          if [ -z "${EXE_ZST}" ]; then
            echo "::error::no *.exe.zst artifact found under dist/"
            find dist -type f
            exit 1
          fi
          # choco is pre-installed on windows-2022; install zstandard for .zst.
          choco install zstandard -y --no-progress >/dev/null
          zstd -d "${EXE_ZST}" -o "smoke.exe"
          ls -l smoke.exe
      - name: Smoke
        shell: bash
        env:
          SMOKE_JSON: ${{ needs.preflight.outputs.smoke }}
          SMOKE_PATTERN: ${{ needs.preflight.outputs.smoke_pattern }}
        run: |
          set -euo pipefail
          # git-bash's jq emits CRLF; `read -r` strips \n but leaves \r,
          # so the arg passed to the .exe arrives as `--version\r` and
          # rejects. `${arg%$'\r'}` didn't match in the runner's shell
          # for unclear reasons — tr -d is unambiguous.
          SMOKE_ARGS=()
          while IFS= read -r arg; do
            SMOKE_ARGS+=("$(printf '%s' "$arg" | tr -d '\r')")
          done < <(jq -r '.[]' <<<"${SMOKE_JSON}")
          echo "Running: smoke.exe ${SMOKE_ARGS[*]}"
          OUTPUT="$(./smoke.exe "${SMOKE_ARGS[@]}" 2>&1)"
          echo "${OUTPUT}"
          if [ -n "${SMOKE_PATTERN}" ]; then
            if ! grep -Eq -- "${SMOKE_PATTERN}" <<<"${OUTPUT}"; then
              echo "::error::smoke output did not match pattern: ${SMOKE_PATTERN}"
              exit 1
            fi
          fi

  release:
    name: release
    if: inputs.create_release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - run: ls -lh dist/

      # Compose the release body from CHANGELOG.md (the user-facing,
      # curated record) plus a generic header. The release.yml tag job
      # has already promoted `[Unreleased]` to a `## [<tag>]` section, so
      # we extract that section. Tolerant of absence: a repo with no
      # CHANGELOG.md (or no matching section) falls back to GitHub's
      # auto-generated commit notes, so this is safe to run for every
      # package whether or not it has adopted a changelog yet.
      - id: notes
        env:
          PKG: ${{ needs.preflight.outputs.package_name }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          # Display version: strip leading "v" and a trailing "-<pkgrel>".
          VER="${TAG#v}"
          VER="${VER%-*}"

          # Headline: reuse the README's opening sentence verbatim (it carries
          # the upstream link) and splice the version in right after the linked
          # name, so the release leads with the same sentence users see in the
          # README. The opening is the first link line after the H1 — starts
          # with "[" but not "[!" (which is a badge/image). Fall back to a
          # generic line if the README has no such opening.
          HEADLINE="**${PKG} ${VER}** — a single self-contained binary, built natively per platform."
          if [ -f README.md ]; then
            OPEN="$(grep -m1 -E '^\[[^!]' README.md || true)"
            if [ -n "${OPEN}" ]; then
              HEADLINE="$(printf '%s' "${OPEN}" | awk -v ver="${VER}" '
                { i = index($0, ") "); if (i > 0) print substr($0,1,i) " " ver substr($0,i+1); else print }
              ')"
            fi
          fi

          # Provenance: the nixpkgs base this binary was built on. It is a
          # standing fact of every release (not a discrete change, so it lives
          # here rather than in the changelog), and it lets users confirm the
          # toolchain base is current, not a deprecated channel. The consumer
          # flake follows nix-lib's single nixpkgs pin, so the `nixpkgs` lock
          # node is that base. Lead with the channel label (e.g. nixos-26.05) —
          # the currency signal the user reads — and keep the exact rev + date
          # in parentheses. Best-effort; omitted if nixpkgs isn't resolvable.
          NIXPKGS_LINE=""
          if [ -f flake.lock ]; then
            REF="$(jq -r '.nodes.nixpkgs.original.ref // empty' flake.lock 2>/dev/null || true)"
            REV="$(jq -r '.nodes.nixpkgs.locked.rev // empty' flake.lock 2>/dev/null || true)"
            EPOCH="$(jq -r '.nodes.nixpkgs.locked.lastModified // empty' flake.lock 2>/dev/null || true)"
            OWNER="$(jq -r '.nodes.nixpkgs.original.owner // empty' flake.lock 2>/dev/null || true)"
            REPO="$(jq -r '.nodes.nixpkgs.original.repo // empty' flake.lock 2>/dev/null || true)"
            if [ -n "${REF}" ] && [ -n "${REV}" ] && [ -n "${EPOCH}" ]; then
              # Link the channel label to its branch when owner/repo are known.
              if [ -n "${OWNER}" ] && [ -n "${REPO}" ]; then
                LABEL="[${REF}](https://github.com/${OWNER}/${REPO}/tree/${REF})"
              else
                LABEL="${REF}"
              fi
              NIXPKGS_LINE="Built on nixpkgs ${LABEL} (\`${REV:0:7}\`, $(date -u -d "@${EPOCH}" +%Y-%m-%d))."
            elif [ -n "${REV}" ] && [ -n "${EPOCH}" ]; then
              NIXPKGS_LINE="Built on nixpkgs \`${REV:0:7}\` ($(date -u -d "@${EPOCH}" +%Y-%m-%d))."
            fi
          fi

          {
            echo "${HEADLINE}"
            echo
            echo "Install with [unpin](https://github.com/unpins/unpin):"
            echo
            echo '```'
            echo "unpin install ${PKG}"
            echo '```'
            echo
            echo "Standalone binaries for manual download are attached below."
            if [ -n "${NIXPKGS_LINE}" ]; then echo; echo "${NIXPKGS_LINE}"; fi
          } > body.md

          SECTION=""
          if [ -f CHANGELOG.md ]; then
            # Pull the lines under "## [<tag>]" up to the next "## " heading.
            # Match the heading by prefix: it is "## [<tag>] - <date>".
            SECTION="$(awk -v prefix="## [${TAG}]" '
              index($0, prefix) == 1 { grab=1; next }
              grab && /^## / { exit }
              grab { print }
            ' CHANGELOG.md | sed -e '/./,$!d' | sed -e ':a' -e '/^\n*$/{$d;N;ba}')"
          fi

          if [ -n "${SECTION}" ]; then
            # Reflow: GitHub renders single newlines in a release body as <br>,
            # so the CHANGELOG's ~80-col hard wraps would show as ragged breaks.
            # Join wrapped lines within each paragraph / list item into one line
            # (keeping blank-line separators, headings, list-item starts, and
            # fenced code blocks verbatim) so the body renders like prose.
            {
              echo
              echo "## Changes"
              echo
              printf '%s\n' "${SECTION}" | awk '
                function flush(){ if (buf != "") { print buf; buf="" } }
                /^```/        { flush(); code = !code; print; next }
                code          { print; next }
                /^[[:space:]]*$/ { flush(); print ""; next }
                /^#/          { flush(); print; next }
                /^[-*] /      { flush(); buf = $0; next }
                { line = $0; sub(/^[[:space:]]+/, "", line); buf = (buf == "" ? line : buf " " line) }
                END { flush() }
              '
            } >> body.md
            echo "generate=false" >> "${GITHUB_OUTPUT}"
          else
            # No curated changelog section — let GitHub append the commit
            # list so the release still says something.
            echo "generate=true" >> "${GITHUB_OUTPUT}"
          fi

          echo "----- release body -----"
          cat body.md

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          body_path: body.md
          generate_release_notes: ${{ steps.notes.outputs.generate == 'true' }}
          files: dist/*
          fail_on_unmatched_files: true
